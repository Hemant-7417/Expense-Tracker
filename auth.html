<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker Pro | Sign In</title>
  <meta name="description" content="Sign in to Finance Tracker Pro — your premium money intelligence dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="auth.css" />
</head>

<body data-theme="dark">

  <!-- Floating Orbs -->
  <div class="auth-orb auth-orb--1"></div>
  <div class="auth-orb auth-orb--2"></div>
  <div class="auth-orb auth-orb--3"></div>

  <!-- Theme Toggle -->
  <button id="auth-theme-toggle" class="auth-theme-toggle" title="Toggle Theme">
    <span id="auth-theme-icon">🌙</span>
  </button>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-card">

      <!-- Brand Header -->
      <div class="auth-brand">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"></line>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
        </div>
        <h1>Finance Tracker Pro</h1>
        <p>Premium money intelligence dashboard</p>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="tab-login">Sign In</button>
        <button class="auth-tab" data-tab="signup" id="tab-signup">Create Account</button>
      </div>

      <!-- Global Error -->
      <div id="auth-global-error" class="auth-global-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
        <span id="auth-error-text"></span>
      </div>

      <!-- Success Message -->
      <div id="auth-success-msg" class="auth-success-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span id="auth-success-text"></span>
      </div>

      <!-- Form Wrapper -->
      <div class="auth-form-wrapper">

        <!-- ═══ LOGIN FORM ═══ -->
        <form id="login-form" class="auth-form active" novalidate>
          <div class="auth-input-group">
            <label for="login-email">Email Address</label>
            <div class="auth-input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </svg>
              <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div class="input-error-msg" id="login-email-error"></div>
          </div>

          <div class="auth-input-group">
            <label for="login-password">Password</label>
            <div class="auth-input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required />
              <button type="button" class="toggle-password" data-target="login-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="input-error-msg" id="login-password-error"></div>
          </div>

          <div class="auth-options">
            <label class="remember-me">
              <input type="checkbox" id="remember-me" checked />
              Remember me
            </label>
            <button type="button" class="forgot-link" id="forgot-password-btn">Forgot password?</button>
          </div>

          <button type="submit" class="auth-submit-btn" id="login-submit-btn">
            <span class="spinner"></span>
            <span class="btn-text">Sign In</span>
          </button>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <button type="button" class="google-btn" id="google-login-btn">
            <svg viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </form>

        <!-- ═══ SIGNUP FORM ═══ -->
        <form id="signup-form" class="auth-form" novalidate>
          <div class="auth-input-group">
            <label for="signup-name">Full Name</label>
            <div class="auth-input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <input type="text" id="signup-name" placeholder="John Doe" autocomplete="name" required />
            </div>
            <div class="input-error-msg" id="signup-name-error"></div>
          </div>

          <div class="auth-input-group">
            <label for="signup-email">Email Address</label>
            <div class="auth-input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </svg>
              <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div class="input-error-msg" id="signup-email-error"></div>
          </div>

          <div class="auth-input-group">
            <label for="signup-password">Password</label>
            <div class="auth-input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password" required minlength="6" />
              <button type="button" class="toggle-password" data-target="signup-password" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="password-strength" id="password-strength">
              <div class="strength-bar" id="str-bar-1"></div>
              <div class="strength-bar" id="str-bar-2"></div>
              <div class="strength-bar" id="str-bar-3"></div>
              <div class="strength-bar" id="str-bar-4"></div>
            </div>
            <div class="strength-label" id="strength-label"></div>
            <div class="input-error-msg" id="signup-password-error"></div>
          </div>

          <div class="auth-input-group">
            <label for="signup-confirm">Confirm Password</label>
            <div class="auth-input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              </svg>
              <input type="password" id="signup-confirm" placeholder="Re-enter password" autocomplete="new-password" required />
            </div>
            <div class="input-error-msg" id="signup-confirm-error"></div>
          </div>

          <button type="submit" class="auth-submit-btn" id="signup-submit-btn">
            <span class="spinner"></span>
            <span class="btn-text">Create Account</span>
          </button>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <button type="button" class="google-btn" id="google-signup-btn">
            <svg viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </form>

      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <p>Secured with enterprise-grade encryption</p>
      </div>

    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-modal-overlay" class="forgot-modal-overlay">
    <div class="forgot-modal">
      <h3>Reset Password</h3>
      <p>Enter your email address and we'll send you a link to reset your password.</p>
      <div id="forgot-error" class="auth-global-error" style="margin-bottom: 1rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
        <span id="forgot-error-text"></span>
      </div>
      <div id="forgot-success" class="auth-success-msg" style="margin-bottom: 1rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span id="forgot-success-text"></span>
      </div>
      <div class="auth-input-group">
        <div class="auth-input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </svg>
          <input type="email" id="forgot-email" placeholder="you@example.com" />
        </div>
      </div>
      <div class="forgot-modal-actions">
        <button type="button" class="forgot-cancel-btn" id="forgot-cancel-btn">Cancel</button>
        <button type="button" class="auth-submit-btn" id="forgot-submit-btn">
          <span class="spinner"></span>
          <span class="btn-text">Send Reset Link</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (Compat for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <!-- Shared Firebase config (real credentials) -->
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>

</body>
</html>
